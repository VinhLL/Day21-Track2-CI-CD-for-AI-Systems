name: MLOps Pipeline

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main, master]
    paths:
      - 'data/*.dvc'
      - 'data/**/*.dvc'
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'params.yaml'
      - 'requirements.txt'
      - '.github/workflows/mlops.yml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure DVC remote
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          dvc remote add -d myremote "gs://${CLOUD_BUCKET}/dvc" --force

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc -v

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> "$GITHUB_OUTPUT"
          echo "accuracy=$ACC"

      - name: Upload model to Cloud Storage
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage

          bucket_name = os.environ["CLOUD_BUCKET"]
          client = storage.Client()
          bucket = client.bucket(bucket_name)

          bucket.blob("models/latest/model.pkl").upload_from_filename("models/model.pkl")
          bucket.blob("outputs/latest/metrics.json").upload_from_filename("outputs/metrics.json")

          print(f"Uploaded model and metrics to gs://{bucket_name}/")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          threshold = 0.70
          acc = float("${{ needs.train.outputs.accuracy }}")

          if acc < threshold:
              raise SystemExit(f"FAILED: accuracy {acc:.4f} < {threshold:.2f}. Huy deploy.")

          print(f"PASSED: accuracy {acc:.4f} >= {threshold:.2f}. Dang trien khai model.")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            sudo systemctl restart mlops-serve

            for i in $(seq 1 10); do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for mlops-serve... attempt $i"
              sleep 3
            done

            sudo journalctl -u mlops-serve -n 50 --no-pager
            exit 1
